font=JetBrainsMonoNL Nerd Font Mono:size=12
use-bold=yes
prompt="> "
placeholder=search…
icon-theme=default
icons-enabled=yes
match-mode=fzf
match-counter=yes
terminal=kitty -e
anchor=center
lines=10
width=35
horizontal-pad=20
vertical-pad=8
inner-pad=4
line-height=22
letter-spacing=0
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
background=0E0C08f2
text=D4A843ff
message=8A7040ff
prompt=FFD700ff
placeholder=766035ff
input=F0B030ff
match=FFD700ff
selection=1E1808ff
selection-text=FFD700ff
selection-match=FFD700ff
counter=8A7040ff
border=FFD700ff

[border]
width=1
radius=0
selection-radius=0
